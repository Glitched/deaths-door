<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Death's Door — Dev Console</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0d1117;
        color: #c9d1d9;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        padding: 0.6rem 1rem;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        flex: 0 0 auto;
      }
      h1 { font-size: 0.95rem; margin: 0; font-weight: 600; white-space: nowrap; }
      h2 {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
        color: #8b949e; margin: 1rem 0 0.5rem; font-weight: 600;
      }
      h2:first-child { margin-top: 0; }
      .status { display: flex; align-items: center; }
      .dot { width: 0.7rem; height: 0.7rem; border-radius: 50%; margin-right: 0.4rem; display: inline-block; }
      .ok { background: #3fb950; }
      .warn { background: #d29922; }
      .err { background: #f85149; }
      .pill {
        background: #21262d; border: 1px solid #30363d; border-radius: 999px;
        padding: 0.15rem 0.6rem; font-size: 0.8rem; white-space: nowrap;
      }
      .muted { color: #8b949e; }
      .grow { flex: 1; }

      /* Two-column shell */
      .shell { flex: 1; display: grid; grid-template-columns: 340px 1fr; min-height: 0; }
      .controls { border-right: 1px solid #30363d; overflow-y: auto; padding: 1rem; background: #0d1117; }
      .main { display: flex; flex-direction: column; min-width: 0; }
      @media (max-width: 760px) {
        body { overflow: auto; }
        .shell { grid-template-columns: 1fr; }
        .controls { border-right: none; border-bottom: 1px solid #30363d; }
      }

      /* Controls */
      .row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.45rem; }
      label.small { font-size: 0.75rem; color: #8b949e; min-width: 3.5rem; }
      button {
        font: inherit; font-size: 0.8rem; cursor: pointer;
        background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
        border-radius: 6px; padding: 0.32rem 0.6rem; transition: background 0.1s, border-color 0.1s;
      }
      button:hover { background: #30363d; border-color: #444c56; }
      button:active { background: #1c2128; }
      button.primary { background: #238636; border-color: #2ea043; color: #fff; }
      button.primary:hover { background: #2ea043; }
      button.danger { color: #f85149; border-color: #5d2a2a; }
      button.danger:hover { background: #3a1f1f; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      input, select {
        font: inherit; font-size: 0.8rem; background: #0d1117; color: #c9d1d9;
        border: 1px solid #30363d; border-radius: 6px; padding: 0.32rem 0.5rem;
      }
      input:focus, select:focus { outline: none; border-color: #58a6ff; }
      input[type="number"] { width: 4.5rem; }
      .field { flex: 1; min-width: 0; }

      .chip {
        display: inline-flex; align-items: center; gap: 0.3rem;
        background: #21262d; border: 1px solid #30363d; border-radius: 999px;
        padding: 0.1rem 0.5rem; font-size: 0.72rem; margin: 0.15rem 0.15rem 0 0;
      }
      .chip button { padding: 0 0.2rem; border: none; background: none; color: #8b949e; font-size: 0.8rem; line-height: 1; }
      .chip button:hover { color: #f85149; background: none; }

      details { margin-bottom: 0.5rem; }
      summary { cursor: pointer; font-size: 0.8rem; color: #8b949e; padding: 0.2rem 0; user-select: none; }
      .checkgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.1rem 0.6rem; max-height: 12rem; overflow-y: auto; padding: 0.3rem 0; font-size: 0.76rem; }
      .checkgrid label { display: flex; gap: 0.35rem; align-items: center; }

      /* Main view */
      .tabs { display: flex; gap: 0.3rem; padding: 0.55rem 1rem; border-bottom: 1px solid #30363d; background: #161b22; flex: 0 0 auto; }
      .tab { font-size: 0.8rem; }
      .tab.active { background: #1f6feb33; border-color: #1f6feb; color: #fff; }
      .view { flex: 1; overflow-y: auto; padding: 1rem; min-height: 0; }
      .view[hidden] { display: none; }

      .stateline { font-size: 0.85rem; margin-bottom: 0.9rem; color: #c9d1d9; }
      .stateline b { color: #fff; }

      .players { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.55rem; }
      .pcard { border: 1px solid #30363d; border-radius: 8px; padding: 0.55rem 0.65rem; background: #161b22; }
      .pcard.dead { opacity: 0.55; }
      .pcard .pname { font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }
      .pcard.dead .pname .nm { text-decoration: line-through; }
      .align-good { color: #58a6ff; }
      .align-evil { color: #f85149; }
      .prole { font-size: 0.78rem; color: #8b949e; margin: 0.15rem 0 0.35rem; }
      .pactions { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.4rem; }
      .pactions button { padding: 0.2rem 0.45rem; font-size: 0.72rem; }
      .tag { font-size: 0.62rem; padding: 0.05rem 0.35rem; border-radius: 4px; background: #30363d; color: #c9d1d9; }
      .tag.skull { background: #5d2a2a; color: #ffb4b4; }
      .tag.vote { background: #1f3a5f; color: #9ecbff; }
      .tag.block { background: #5d452a; color: #ffd9a8; }

      .steps { display: flex; flex-direction: column; gap: 0.2rem; }
      .step { padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.8rem; border: 1px solid transparent; }
      .step.current { background: #1f6feb22; border-color: #1f6feb; color: #fff; }
      .step .sdesc { color: #8b949e; font-size: 0.72rem; }

      /* Events */
      table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
      th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #21262d; vertical-align: top; }
      th { color: #8b949e; font-weight: 600; position: sticky; top: 0; background: #0d1117; }
      tr.head-version td { background: #161b2255; }
      .etype { font-size: 0.68rem; color: #8b949e; }
      td.evactions { white-space: nowrap; }
      td.evactions button { padding: 0.15rem 0.4rem; font-size: 0.7rem; }

      pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 0.82rem; line-height: 1.45; tab-size: 2; }

      /* Toasts */
      #toasts { position: fixed; bottom: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.4rem; z-index: 50; }
      .toast { padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.8rem; border: 1px solid #30363d; background: #161b22; box-shadow: 0 4px 16px #0008; max-width: 22rem; animation: slidein 0.15s ease; }
      .toast.ok { border-color: #2ea043; }
      .toast.err { border-color: #f85149; color: #ffb4b4; }
      @keyframes slidein { from { transform: translateX(20px); opacity: 0; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Death's Door · <span class="muted">dev console</span></h1>
      <span class="status"><span id="dot" class="dot warn"></span><span id="statusText">connecting…</span></span>
      <span class="pill" id="frames">0 frames</span>
      <span class="pill" id="age">—</span>
      <span class="grow"></span>
      <span class="pill muted" id="summary">—</span>
    </header>

    <div class="shell">
      <!-- LEFT: control panel -->
      <aside class="controls">
        <h2>Game</h2>
        <div class="row">
          <select id="scriptSel" class="field">
            <option value="trouble_brewing">Trouble Brewing</option>
            <option value="sects_and_violets">Sects and Violets</option>
            <option value="bad_moon_rising">Bad Moon Rising</option>
          </select>
          <button id="newGameBtn">New game</button>
        </div>
        <div class="row">
          <button id="quickBtn" class="primary" title="New TB game + role pool + 7 players + reveal">⚡ Quick setup</button>
          <button id="revealBtn">Toggle reveal</button>
        </div>
        <div class="row">
          <label class="small">Load</label>
          <select id="gameSel" class="field"><option>—</option></select>
          <button id="loadBtn">Load</button>
        </div>

        <h2>Players</h2>
        <div class="row">
          <input id="playerName" class="field" placeholder="Player name" />
          <button id="addPlayerBtn">+ Player</button>
        </div>
        <div class="row">
          <input id="travelerName" class="field" placeholder="Traveler name" />
          <button id="addTravelerBtn">+ Traveler</button>
        </div>

        <h2>Role pool</h2>
        <div id="poolChips" class="muted" style="font-size:0.75rem">—</div>
        <details>
          <summary>Add roles from script</summary>
          <div id="roleChecks" class="checkgrid"></div>
          <div class="row" style="margin-top:0.4rem">
            <button id="addRolesBtn">Add checked</button>
            <button id="refreshRolesBtn" class="muted">↻ roles</button>
          </div>
        </details>

        <h2>Night phase</h2>
        <div class="row">
          <button id="nightToggleBtn" title="Toggle first night ⇄ other nights">Phase: —</button>
        </div>
        <div class="row">
          <button id="duskBtn">Dusk</button>
          <button id="prevStepBtn">◀ Prev</button>
          <button id="nextStepBtn">Next ▶</button>
          <button id="dawnBtn">Dawn</button>
        </div>

        <h2>Timer</h2>
        <div class="row">
          <input id="timerSecs" type="number" value="180" min="0" max="3600" />
          <button id="setTimerBtn">Set &amp; start</button>
        </div>
        <div class="row">
          <button data-add="-30">−30</button>
          <button data-add="30">+30</button>
          <button data-add="60">+60</button>
          <button id="startTimerBtn">Start</button>
          <button id="stopTimerBtn">Stop</button>
        </div>

        <h2>Sounds</h2>
        <div id="soundList" class="row muted" style="font-size:0.75rem">loading…</div>

        <h2>Lights</h2>
        <div id="lightsStatus" class="muted" style="font-size:0.75rem">—</div>
        <div id="sceneList" class="row"></div>
        <div class="row"><button id="blackoutBtn" class="danger">Blackout</button></div>
      </aside>

      <!-- RIGHT: main view -->
      <section class="main">
        <div class="tabs">
          <button class="tab active" data-view="state">State</button>
          <button class="tab" data-view="events">Events</button>
          <button class="tab" data-view="raw">Raw</button>
          <span class="grow"></span>
          <button id="refreshEventsBtn" class="muted" style="font-size:0.75rem">↻</button>
        </div>

        <div class="view" id="view-state">
          <div class="stateline" id="stateLine">Waiting for first frame…</div>
          <div class="players" id="playersEl"></div>
          <h2 style="margin-top:1.2rem">Night steps <span class="muted" id="phaseLabel"></span></h2>
          <div class="steps" id="stepsEl"></div>
        </div>

        <div class="view" id="view-events" hidden>
          <table>
            <thead><tr><th>v</th><th>time</th><th>event</th><th></th></tr></thead>
            <tbody id="eventsBody"></tbody>
          </table>
        </div>

        <div class="view" id="view-raw" hidden>
          <pre id="dump">Waiting for first frame…</pre>
        </div>
      </section>
    </div>

    <div id="toasts"></div>

    <script>
      // ---------- tiny helpers ----------
      const $ = (id) => document.getElementById(id);
      const el = (tag, props = {}, kids = []) => {
        const e = Object.assign(document.createElement(tag), props);
        for (const k of [].concat(kids)) e.append(k);
        return e;
      };
      function toast(msg, kind = "ok") {
        const t = el("div", { className: "toast " + kind, textContent: msg });
        $("toasts").append(t);
        setTimeout(() => t.remove(), kind === "err" ? 5000 : 2200);
      }
      // Same-origin: this page is served by the backend at /debug.
      async function api(method, path, body) {
        const opts = { method, headers: {} };
        if (body !== undefined) {
          opts.headers["Content-Type"] = "application/json";
          opts.body = JSON.stringify(body);
        }
        const res = await fetch(path, opts);
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch { data = text; }
        if (!res.ok) {
          const detail = (data && data.detail) || text || res.statusText;
          throw new Error(`${res.status} ${detail}`);
        }
        return data;
      }
      // Fire a call, toast the outcome, refresh history.
      async function act(label, fn) {
        try {
          await fn();
          toast(label, "ok");
          loadHistory();
        } catch (e) {
          toast(`${label}: ${e.message}`, "err");
        }
      }

      let state = null; // latest SSE frame

      // ---------- SSE stream (raw + live state) ----------
      const dot = $("dot"), statusText = $("statusText"), dump = $("dump");
      const framesEl = $("frames"), ageEl = $("age"), summaryEl = $("summary");
      let frames = 0, lastTs = null;
      const setStatus = (text, cls) => { statusText.textContent = text; dot.className = "dot " + cls; };

      const es = new EventSource("/game/stream");
      es.onopen = () => setStatus("connected", "ok");
      es.onerror = () => setStatus("disconnected — retrying…", "err");
      es.onmessage = (e) => {
        frames++; lastTs = Date.now();
        framesEl.textContent = frames + (frames === 1 ? " frame" : " frames");
        setStatus("connected", "ok");
        try {
          state = JSON.parse(e.data);
          dump.textContent = JSON.stringify(state, null, 2);
          const players = Array.isArray(state.players) ? state.players.length : "?";
          const timer = state.timer ? `${state.timer.seconds}s ${state.timer.is_running ? "▶" : "⏸"}` : "no timer";
          summaryEl.textContent = `${state.script_name || "?"} · ${players} players · ${state.current_night_step || "?"} · ${timer}`;
          renderState();
        } catch {
          dump.textContent = "[unparseable frame]\n" + e.data;
        }
      };
      setInterval(() => { if (lastTs) ageEl.textContent = ((Date.now() - lastTs) / 1000).toFixed(1) + "s ago"; }, 200);

      // ---------- view toggle ----------
      let activeView = "state";
      document.querySelectorAll(".tab[data-view]").forEach((b) =>
        b.addEventListener("click", () => {
          activeView = b.dataset.view;
          document.querySelectorAll(".tab[data-view]").forEach((x) => x.classList.toggle("active", x === b));
          for (const v of ["state", "events", "raw"]) $("view-" + v).hidden = v !== activeView;
          if (activeView === "events") loadHistory();
        })
      );

      // ---------- State view ----------
      function alignClass(a) { return a === "evil" ? "align-evil" : "align-good"; }
      function renderState() {
        if (!state) return;
        const alive = state.living_player_count ?? 0;
        const total = (state.players || []).length;
        const t = state.timer || {};
        $("stateLine").innerHTML =
          `<b>${state.script_name || "?"}</b> · ${state.is_first_night ? "first night" : "other night"} ` +
          `· step <b>${state.current_night_step || "—"}</b> · <b>${alive}</b>/${total} alive ` +
          `· ${state.execution_threshold ?? "?"} to execute · roles ${state.should_reveal_roles ? "revealed" : "hidden"} ` +
          (state.chopping_block ? `· 🪓 <b>${state.chopping_block.player_name}</b> on the block ` : "") +
          (state.active_effect ? `· ✨ <b>${state.active_effect.scene}</b> playing ` : "") +
          `· ⏱ ${t.seconds ?? "?"}s ${t.is_running ? "▶" : "⏸"}`;

        // Stateful toggle buttons double as live indicators of current state.
        $("nightToggleBtn").textContent = `Phase: ${state.is_first_night ? "first night" : "other nights"}`;
        $("nightToggleBtn").classList.toggle("primary", state.is_first_night);
        $("revealBtn").textContent = `Reveal: ${state.should_reveal_roles ? "on" : "off"}`;
        $("revealBtn").classList.toggle("primary", state.should_reveal_roles);

        // Players
        const wrap = $("playersEl");
        wrap.textContent = "";
        for (const p of state.players || []) {
          const dead = !p.is_alive;
          const onBlock = state.chopping_block?.player_name === p.name;
          const card = el("div", { className: "pcard" + (dead ? " dead" : "") });
          const name = el("div", { className: "pname" });
          name.append(el("span", { className: "nm " + alignClass(p.alignment), textContent: p.name }));
          if (dead) name.append(el("span", { className: "tag skull", textContent: "☠" }));
          if (onBlock) name.append(el("span", { className: "tag block", textContent: "🪓 on block" }));
          if (p.has_used_dead_vote) name.append(el("span", { className: "tag", textContent: "voted" }));
          else if (dead) name.append(el("span", { className: "tag vote", textContent: "has vote" }));
          card.append(name);
          card.append(el("div", { className: "prole", textContent: `${p.character?.name ?? "?"} · ${p.alignment}` }));
          for (const eff of p.status_effects || [])
            card.append(el("span", { className: "chip", textContent: eff }));
          const actions = el("div", { className: "pactions" });
          const kill = el("button", { textContent: dead ? "Revive" : "Kill", className: dead ? "" : "danger" });
          kill.onclick = () => act(`${dead ? "Revived" : "Killed"} ${p.name}`,
            () => api("POST", "/players/set_alive", { name: p.name, is_alive: dead }));
          const rm = el("button", { textContent: "✕", title: "Remove", className: "danger" });
          rm.onclick = () => act(`Removed ${p.name}`, () => api("POST", "/players/remove", { name: p.name }));
          actions.append(kill, rm);
          // Living players can be put on / taken off the chopping block.
          if (!dead) {
            const block = el("button", { textContent: onBlock ? "Off block" : "Block", title: onBlock ? "Clear the chopping block" : "Put on the chopping block" });
            block.onclick = () => onBlock
              ? act("Cleared chopping block", () => api("POST", "/game/chopping_block/clear"))
              : act(`${p.name} on the block`, () => api("POST", "/game/chopping_block", { player_name: p.name }));
            actions.append(block);
          }
          card.append(actions);
          wrap.append(card);
        }
        if (total === 0) wrap.append(el("div", { className: "muted", textContent: "No players yet." }));

        // Role pool chips
        const pool = $("poolChips");
        pool.textContent = "";
        const roles = state.included_roles || [];
        if (!roles.length) pool.append(el("span", { className: "muted", textContent: "empty" }));
        for (const r of roles) {
          const chip = el("span", { className: "chip" });
          chip.append(document.createTextNode(r.name));
          const x = el("button", { textContent: "×", title: "Remove from pool" });
          x.onclick = () => act(`Removed role ${r.name}`, () => api("POST", "/characters/remove", { name: r.name }));
          chip.append(x);
          pool.append(chip);
        }

        // Night steps
        $("phaseLabel").textContent = state.is_first_night ? "(first night)" : "(other nights)";
        const steps = $("stepsEl");
        steps.textContent = "";
        for (const s of state.night_steps || []) {
          const isCur = s.name === state.current_night_step;
          const row = el("div", { className: "step" + (isCur ? " current" : "") });
          row.append(el("span", { textContent: s.name }));
          if (s.description) row.append(el("span", { className: "sdesc", textContent: "  — " + s.description }));
          row.onclick = () => act(`Step → ${s.name}`, () => api("POST", "/game/night/phase/step", { step: s.name }));
          row.style.cursor = "pointer";
          steps.append(row);
        }
      }

      // Build the ordered step sequence for prev/next (Dusk … steps … Dawn).
      function stepSequence() {
        const names = (state?.night_steps || []).map((s) => s.name);
        const seq = ["Dusk", ...names, "Dawn"];
        return seq.filter((n, i) => seq.indexOf(n) === i);
      }
      function gotoStep(delta) {
        const seq = stepSequence();
        let i = seq.indexOf(state?.current_night_step);
        if (i === -1) i = 0;
        const next = seq[Math.min(seq.length - 1, Math.max(0, i + delta))];
        act(`Step → ${next}`, () => api("POST", "/game/night/phase/step", { step: next }));
      }

      // ---------- Events view ----------
      async function loadHistory() {
        if (activeView !== "events") return;
        let h;
        try { h = await api("GET", "/game/history"); }
        catch (e) { return; }
        const body = $("eventsBody");
        body.textContent = "";
        for (const ev of h.events) {
          const tr = el("tr");
          tr.append(el("td", { textContent: ev.version }));
          const time = new Date(ev.timestamp);
          tr.append(el("td", { className: "muted", textContent: isNaN(time) ? "" : time.toLocaleTimeString() }));
          const td = el("td");
          td.append(el("div", { textContent: ev.description }));
          td.append(el("div", { className: "etype", textContent: ev.event_type }));
          tr.append(td);
          const actTd = el("td", { className: "evactions" });
          const rw = el("button", { textContent: "Rewind", title: `Rewind to v${ev.version}` });
          rw.onclick = () => { if (confirm(`Rewind to v${ev.version}? Destroys later events.`)) act(`Rewound to v${ev.version}`, () => api("POST", "/game/rewind", { to_version: ev.version })); };
          const fk = el("button", { textContent: "Fork" });
          fk.onclick = () => act(`Forked from v${ev.version}`, () => api("POST", "/game/fork", { from_version: ev.version }));
          actTd.append(rw, fk);
          tr.append(actTd);
          body.append(tr);
        }
        if (!h.events.length) body.append(el("tr", {}, el("td", { colSpan: 4, className: "muted", textContent: "No events." })));
      }

      // ---------- control wiring ----------
      $("newGameBtn").onclick = () => act("New game", () => api("POST", "/game/new", { script_name: $("scriptSel").value }));
      $("revealBtn").onclick = () => act("Toggled reveal", () => api("POST", "/players/set_visibility", { should_reveal_roles: !(state?.should_reveal_roles) }));

      $("addPlayerBtn").onclick = () => {
        const name = $("playerName").value.trim() || `Player ${(state?.players?.length ?? 0) + 1}`;
        act(`Added ${name}`, async () => { await api("POST", "/players/add", { name }); $("playerName").value = ""; });
      };
      $("addTravelerBtn").onclick = () => {
        const traveler = $("travelerName").value.trim();
        if (!traveler) return toast("Enter a traveler name", "err");
        const name = `${traveler} (trav)`;
        act(`Added traveler ${traveler}`, async () => { await api("POST", "/players/add_traveler", { name, traveler }); $("travelerName").value = ""; });
      };

      $("nightToggleBtn").onclick = () => {
        const next = !(state?.is_first_night);
        act(next ? "→ first night" : "→ other nights", () => api("POST", "/game/night/phase/first_night", { is_first_night: next }));
      };
      $("duskBtn").onclick = () => act("Step → Dusk", () => api("POST", "/game/night/phase/step", { step: "Dusk" }));
      $("dawnBtn").onclick = () => act("Step → Dawn", () => api("POST", "/game/night/phase/step", { step: "Dawn" }));
      $("prevStepBtn").onclick = () => gotoStep(-1);
      $("nextStepBtn").onclick = () => gotoStep(1);

      $("setTimerBtn").onclick = () => act("Timer set", () => api("GET", `/timer/set/${parseInt($("timerSecs").value || "0", 10)}`));
      $("startTimerBtn").onclick = () => act("Timer started", () => api("GET", "/timer/start"));
      $("stopTimerBtn").onclick = () => act("Timer stopped", () => api("GET", "/timer/stop"));
      document.querySelectorAll("button[data-add]").forEach((b) =>
        b.onclick = () => act(`Timer ${b.dataset.add}s`, () => api("GET", `/timer/add/${b.dataset.add}`)));

      $("refreshEventsBtn").onclick = loadHistory;

      // Role pool: checkbox grid populated from the script's full catalog.
      async function refreshRoleChecks() {
        const grid = $("roleChecks");
        grid.textContent = "loading…";
        try {
          const roles = await api("GET", "/game/script/roles");
          grid.textContent = "";
          for (const r of roles) {
            const lbl = el("label");
            lbl.append(el("input", { type: "checkbox", value: r.name }), document.createTextNode(r.name));
            grid.append(lbl);
          }
          if (!roles.length) grid.textContent = "(no roles — create a game first)";
        } catch (e) { grid.textContent = "error: " + e.message; }
      }
      $("refreshRolesBtn").onclick = refreshRoleChecks;
      $("addRolesBtn").onclick = () => {
        const names = [...$("roleChecks").querySelectorAll("input:checked")].map((c) => c.value);
        if (!names.length) return toast("Check some roles first", "err");
        act(`Added ${names.length} roles`, async () => {
          await api("POST", "/characters/add/multi", { names });
          $("roleChecks").querySelectorAll("input:checked").forEach((c) => (c.checked = false));
        });
      };

      // Quick setup: game → balanced 8-role pool → 7 players → reveal.
      $("quickBtn").onclick = () => act("Quick setup done", async () => {
        await api("POST", "/game/new", { script_name: "trouble_brewing" });
        await api("POST", "/characters/add/multi", { names: ["Imp", "Poisoner", "Baron", "Washerwoman", "Chef", "Empath", "Mayor", "Virgin"] });
        for (let i = 1; i <= 7; i++) await api("POST", "/players/add", { name: `Player ${i}` });
        await api("POST", "/players/set_visibility", { should_reveal_roles: true });
        refreshRoleChecks();
      });

      // Game list + load
      async function refreshGames() {
        try {
          const { game_ids } = await api("GET", "/game/list");
          const sel = $("gameSel");
          sel.textContent = "";
          for (const id of game_ids) sel.append(el("option", { value: id, textContent: id.slice(0, 8) + "…" }));
          if (!game_ids.length) sel.append(el("option", { textContent: "—" }));
        } catch {}
      }
      $("loadBtn").onclick = () => { const id = $("gameSel").value; if (id && id !== "—") act("Loaded game", () => api("POST", "/game/load", { game_id: id })); };

      // Sounds
      async function refreshSounds() {
        const box = $("soundList");
        try {
          const cats = await api("GET", "/sounds/list");
          box.textContent = "";
          for (const [cat, names] of Object.entries(cats)) {
            const d = el("details");
            d.append(el("summary", { textContent: `${cat} (${names.length})` }));
            const row = el("div", { className: "row" });
            for (const n of names) {
              const b = el("button", { textContent: n.split("/").pop() });
              b.onclick = () => act(`▶ ${n}`, () => api("GET", `/sounds/play/${encodeURIComponent(n)}`));
              row.append(b);
            }
            d.append(row);
            box.append(d);
          }
        } catch (e) { box.textContent = "unavailable"; }
      }

      // Lights (degrades gracefully when hardware absent)
      async function refreshLights() {
        try {
          const st = await api("GET", "/lights/status");
          $("lightsStatus").textContent = st.connected ? `connected (${st.serial_port || "?"})` : "not connected";
        } catch { $("lightsStatus").textContent = "unavailable"; }
        try {
          const { scenes } = await api("GET", "/lights/scenes/list");
          const box = $("sceneList");
          box.textContent = "";
          for (const s of scenes || []) {
            const b = el("button", { textContent: s });
            b.onclick = () => act(`Scene ${s}`, () => api("POST", `/lights/scene/${encodeURIComponent(s)}`));
            box.append(b);
          }
        } catch {}
      }
      $("blackoutBtn").onclick = () => act("Blackout", () => api("POST", "/lights/blackout"));

      // ---------- init ----------
      refreshRoleChecks();
      refreshGames();
      refreshSounds();
      refreshLights();
    </script>
  </body>
</html>
